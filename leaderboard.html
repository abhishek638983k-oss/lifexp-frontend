<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeXP | Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="logo" href="dashboard.html">LifeXP</a>
      <nav class="nav-list" aria-label="Main navigation">
        <a class="nav-item" href="dashboard.html">Dashboard</a>
        <a class="nav-item" href="challenge.html">Challenges</a>
        <a class="nav-item active" href="leaderboard.html">Leaderboard</a>
        <a class="nav-item" href="friends.html">Friends</a>
        <a class="nav-item" href="admin.html">Admin</a>
      </nav>
      <button class="btn ghost full-width" id="logoutBtn">Logout</button>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <p class="eyebrow">Leaderboard</p>
          <h1>Top Players</h1>
        </div>
        <button class="btn secondary" id="refreshLeaderboardBtn">Refresh</button>
      </header>

      <section class="table-panel">
        <div class="leaderboard-head">
          <span>Rank</span>
          <span>Username</span>
          <span>XP</span>
        </div>
        <div id="leaderboardList" class="leaderboard-list"></div>
        <p id="leaderboardMessage" class="message" role="status"></p>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
