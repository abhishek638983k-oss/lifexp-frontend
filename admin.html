<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeXP | Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="logo" href="dashboard.html">LifeXP</a>
      <nav class="nav-list" aria-label="Main navigation">
        <a class="nav-item" href="dashboard.html">Dashboard</a>
        <a class="nav-item" href="challenge.html">Challenges</a>
        <a class="nav-item" href="leaderboard.html">Leaderboard</a>
        <a class="nav-item" href="friends.html">Friends</a>
        <a class="nav-item active" href="admin.html">Admin</a>
      </nav>
      <button class="btn ghost full-width" id="logoutBtn">Logout</button>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <p class="eyebrow">Admin</p>
          <h1>Control Panel</h1>
        </div>
      </header>

      <section class="form-panel admin-access-panel">
        <form id="adminSecretForm" class="admin-secret-row">
          <label for="adminSecret">Admin secret</label>
          <input id="adminSecret" type="password" placeholder="Set ADMIN_SECRET in backend .env" required>
          <button class="btn primary" type="submit">Unlock</button>
          <button class="btn secondary" type="button" id="refreshAdminBtn">Refresh</button>
        </form>
      </section>

      <nav class="admin-tabs" aria-label="Admin sections">
        <button class="admin-tab active" type="button" data-admin-tab="overview">Overview</button>
        <button class="admin-tab" type="button" data-admin-tab="users">Users</button>
        <button class="admin-tab" type="button" data-admin-tab="challenges">Challenges</button>
        <button class="admin-tab" type="button" data-admin-tab="attempts">Attempts</button>
        <button class="admin-tab" type="button" data-admin-tab="ai">AI Tools</button>
      </nav>

      <section class="admin-module active" data-admin-panel="overview">
        <article class="form-panel">
          <h2>Stats</h2>
          <div id="adminStats" class="stats-mini"></div>
        </article>
      </section>

      <section class="admin-module" data-admin-panel="users">
        <article class="form-panel">
          <div class="section-heading">
            <h2>Users</h2>
            <input class="admin-search" id="adminUserSearch" placeholder="Search users">
          </div>
          <div id="adminUsers" class="simple-list"></div>
        </article>
      </section>

      <section class="admin-module" data-admin-panel="challenges">
        <div class="admin-grid">
          <article class="form-panel">
            <h2>Add Challenge</h2>
            <form id="adminChallengeForm" class="form-stack">
              <label for="adminChallengeTitle">Title</label>
              <input id="adminChallengeTitle" required>
              <label for="adminChallengeCategory">Category</label>
              <select id="adminChallengeCategory">
                <option value="coding">Coding</option>
                <option value="fitness">Fitness</option>
                <option value="study">Study</option>
                <option value="health">Health</option>
                <option value="career">Career</option>
                <option value="creativity">Creativity</option>
                <option value="mindfulness">Mindfulness</option>
                <option value="finance">Finance</option>
                <option value="communication">Communication</option>
                <option value="household">Household</option>
              </select>
              <label for="adminChallengeDifficulty">Difficulty</label>
              <select id="adminChallengeDifficulty">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
              </select>
              <label for="adminChallengeXp">XP</label>
              <input id="adminChallengeXp" type="number" min="1" value="25" required>
              <label for="adminChallengeDescription">Description</label>
              <textarea id="adminChallengeDescription"></textarea>
              <button class="btn success" type="submit">Add Challenge</button>
            </form>
          </article>

          <article class="form-panel">
            <div class="section-heading">
              <h2>Challenges</h2>
              <input class="admin-search" id="adminChallengeSearch" placeholder="Search challenges">
            </div>
            <div id="adminChallenges" class="simple-list"></div>
          </article>
        </div>
      </section>

      <section class="admin-module" data-admin-panel="attempts">
        <article class="form-panel">
          <div class="section-heading">
            <h2>Recent Attempts</h2>
            <div class="admin-filter-row">
              <input class="admin-search" id="adminAttemptSearch" placeholder="Search attempts">
              <select id="adminAttemptStatus">
                <option value="">All</option>
                <option value="pending_review">Pending</option>
                <option value="completed">Completed</option>
                <option value="rejected">Rejected</option>
                <option value="active">Active</option>
              </select>
            </div>
          </div>
          <div id="adminAttempts" class="simple-list"></div>
        </article>
      </section>

      <section class="admin-module" data-admin-panel="ai">
        <article class="form-panel">
          <h2>Gemini Challenge Generator</h2>
          <form id="geminiChallengeForm" class="form-stack">
            <label for="geminiCategory">Category</label>
            <select id="geminiCategory">
              <option value="coding">Coding</option>
              <option value="fitness">Fitness</option>
              <option value="study">Study</option>
              <option value="health">Health</option>
              <option value="career">Career</option>
              <option value="creativity">Creativity</option>
            </select>
            <label for="geminiDifficulty">Difficulty</label>
            <select id="geminiDifficulty">
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
            </select>
            <button class="btn primary" type="submit">Generate Ideas</button>
          </form>
          <div id="geminiIdeas" class="simple-list"></div>
        </article>
      </section>

      <p id="adminMessage" class="message" role="status"></p>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
